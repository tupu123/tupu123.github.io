<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>简界 · 寻 </title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="white"/><path d="M12 48V16C12 12 16 10 20 10h24c4 0 8 2 8 6v32Z" fill="none" stroke="%232c2c2c" stroke-width="3"/><line x1="32" y1="14" x2="32" y2="44" stroke="%232c2c2c"/><circle cx="32" cy="34" r="6" fill="none" stroke="%232c2c2c"/><line x1="32" y1="28" x2="32" y2="40" stroke="%232c2c2c"/><line x1="26" y1="34" x2="38" y2="34" stroke="%232c2c2c"/><polygon points="32,14 38,18 32,22" fill="%232c2c2c"/></svg>' />

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  /* 固定视口，无滚动条 */
  body {
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: radial-gradient(circle at 20% 30%, #e2e9f0, #c5ced9);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
  }

  /* 典雅背景装饰 (青柠氛围) */
  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(circle at 30% 45%, rgba(210, 225, 200, 0.2) 1.2px, transparent 1px),
                      radial-gradient(circle at 70% 60%, rgba(180, 200, 160, 0.15) 1px, transparent 1px);
    background-size: 48px 48px, 32px 32px;
    background-position: 0 0, 20px 30px;
    pointer-events: none;
    z-index: 0;
  }

  /* 柔光装饰 (青绿氛围) */
  body::after {
    content: "";
    position: fixed;
    top: 10%;
    right: -8%;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(180, 210, 150, 0.25), rgba(160, 190, 130, 0));
    border-radius: 50%;
    filter: blur(70px);
    pointer-events: none;
    z-index: 0;
  }
  
  .bg-orb-left {
    position: fixed;
    bottom: -5%;
    left: -10%;
    width: 380px;
    height: 380px;
    background: radial-gradient(circle, rgba(170, 210, 140, 0.2), rgba(140, 180, 110, 0));
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }

  /* 主玻璃面板 */
  .glass-panel {
    width: 100%;
    max-width: 800px;
    height: auto;
    max-height: 92vh;
    background: rgba(245, 250, 240, 0.3);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-radius: 64px;
    border: 1px solid rgba(255, 255, 245, 0.65);
    box-shadow: 0 32px 56px rgba(0, 0, 0, 0.08), inset 0 1px 0.6px rgba(255, 255, 245, 0.8), inset 0 -4px 12px rgba(255, 255, 245, 0.3);
    padding: 34px 32px 44px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow-y: auto;
    scrollbar-width: none;
    position: relative;
    z-index: 2;
  }
  .glass-panel::-webkit-scrollbar {
    display: none;
  }

  /* 统一玻璃卡片 */
  .glass-card {
    background: rgba(255, 255, 252, 0.88);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 56px;
    border: 1px solid rgba(210, 225, 190, 0.7);
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.03), inset 0 1px 0 rgba(255,255,240,0.9);
    transition: all 0.2s ease;
  }
  
  /* ========= 1. 时间卡片：时:分 + 秒在右下角 ========= */
  .time-block {
    margin-bottom: 24px;
    padding: 20px 30px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: relative;
  }
  .time-main {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .time-digits {
    font-size: 78px;
    font-weight: 620;
    letter-spacing: 6px;
    line-height: 1.1;
    background: linear-gradient(135deg, #2c4a3b, #4a7058);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    text-shadow: 0 1px 2px rgba(210, 230, 190, 0.3);
  }
  /* 秒数显示 (放在右下角独立位置) */
  .seconds-pill {
    font-size: 19px;
    font-weight: 500;
    background: rgba(200, 220, 175, 0.5);
    backdrop-filter: blur(6px);
    padding: 6px 16px;
    border-radius: 60px;
    letter-spacing: 0.5px;
    color: #3a684a;
    border: 0.2px solid rgba(170, 200, 140, 0.6);
    display: inline-flex;
    align-items: center;
    gap: 3px;
    white-space: nowrap;
    margin-left: 12px;
  }
  .date-lotus {
    font-size: 17px;
    font-weight: 500;
    color: #3a5a48;
    background: rgba(220, 238, 200, 0.65);
    padding: 8px 22px;
    border-radius: 100px;
    backdrop-filter: blur(4px);
    letter-spacing: 0.8px;
    border: 0.2px solid rgba(190, 215, 160, 0.6);
  }
  
  /* ========= 2. 搜索框 （青柠色统一）========= */
  .search-block {
    margin-bottom: 24px;
  }
  .search-form {
    position: relative;
    display: flex;
    align-items: center;
    width: 100%;
  }
  .search-input {
    width: 100%;
    padding: 18px 100px 18px 34px;
    font-size: 17px;
    font-weight: 470;
    background: rgba(255, 255, 245, 0.96);
    border: 1px solid rgba(185, 210, 155, 0.7);
    border-radius: 100px;
    outline: none;
    color: #2a4236;
    font-family: inherit;
    letter-spacing: 0.3px;
    transition: all 0.2s ease;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    box-shadow: 0 2px 6px rgba(0,0,0,0.02);
  }
  .search-input:focus {
    transform: none;
    background: rgba(255, 255, 245, 1);
    border-color: #9bc47c;
    box-shadow: 0 6px 16px rgba(100, 140, 70, 0.12), 0 0 0 3px rgba(155, 196, 124, 0.35);
  }
  .search-input::placeholder {
    color: #8aa97b;
    font-weight: 440;
    font-size: 15px;
  }
  .search-btn {
    position: absolute;
    right: 10px;
    height: 50px;
    padding: 0 32px;
    border-radius: 100px;
    border: none;
    background: rgba(155, 196, 124, 0.25);
    backdrop-filter: blur(8px);
    font-size: 15px;
    font-weight: 580;
    color: #356e3a;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.8px;
  }
  .search-btn:hover {
    background: rgba(130, 175, 100, 0.45);
    transform: scale(0.96);
    color: #2a562e;
  }
  
  /* ========= 3. 天气卡片 ========= */
  .weather-block {
    margin-bottom: 24px;
    padding: 20px 28px;
  }
  .weather-main-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .weather-icon {
    font-size: 60px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.06));
  }
  .weather-temp {
    font-size: 60px;
    font-weight: 640;
    line-height: 1;
    color: #2a4a3a;
  }
  .weather-temp small {
    font-size: 28px;
    font-weight: 500;
  }
  .weather-desc {
    font-size: 20px;
    font-weight: 520;
    background: rgba(225, 240, 205, 0.7);
    backdrop-filter: blur(4px);
    padding: 6px 22px;
    border-radius: 60px;
    letter-spacing: 0.6px;
    color: #426a50;
    border: 0.3px solid rgba(190, 215, 160, 0.6);
  }
  .weather-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 18px;
    padding-top: 12px;
    border-top: 1px solid rgba(140, 170, 110, 0.2);
  }
  .weather-location {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    background: rgba(225, 240, 205, 0.6);
    padding: 5px 16px;
    border-radius: 40px;
    backdrop-filter: blur(4px);
    color: #3a6048;
  }
  .weather-update {
    font-size: 12px;
    font-family: monospace;
    background: rgba(225, 240, 205, 0.6);
    padding: 5px 16px;
    border-radius: 40px;
    opacity: 0.8;
    color: #497a59;
  }
  
  /* ========= 4. 诗句卡片 ========= */
  .poetry-block {
    padding: 18px 26px;
    background: rgba(255, 255, 252, 0.88);
    backdrop-filter: blur(14px);
    border-radius: 56px;
    border: 1px solid rgba(210, 225, 190, 0.7);
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.03), inset 0 1px 0 rgba(255,255,240,0.9);
  }
  .poetry-text {
    font-size: 16px;
    font-weight: 460;
    line-height: 1.55;
    text-align: center;
    color: #2c4a3a;
    letter-spacing: 0.5px;
    opacity: 0.92;
    text-shadow: 0 0.5px 0 rgba(230, 245, 200, 0.6);
  }

  /* 响应式适配 */
  @media (min-width: 1024px) {
    .glass-panel {
      max-width: 880px;
      padding: 42px 48px 52px;
    }
    .time-digits {
      font-size: 96px;
      letter-spacing: 8px;
    }
    .seconds-pill {
      font-size: 21px;
      padding: 6px 20px;
    }
    .date-lotus {
      font-size: 18px;
      padding: 8px 26px;
    }
    .search-input {
      padding: 20px 108px 20px 42px;
      font-size: 18px;
    }
    .search-btn {
      height: 54px;
      padding: 0 36px;
      font-size: 16px;
    }
    .weather-icon {
      font-size: 72px;
    }
    .weather-temp {
      font-size: 72px;
    }
    .weather-desc {
      font-size: 22px;
    }
    .poetry-text {
      font-size: 17px;
    }
  }

  @media (max-width: 768px) {
    body {
      padding: 12px;
    }
    .glass-panel {
      max-width: 580px;
      padding: 26px 22px 34px;
      border-radius: 48px;
    }
    .time-block {
      padding: 14px 22px;
      margin-bottom: 18px;
      flex-direction: column;
      align-items: stretch;
    }
    .time-main {
      justify-content: space-between;
      width: 100%;
    }
    .time-digits {
      font-size: 58px;
      letter-spacing: 4px;
    }
    .seconds-pill {
      font-size: 15px;
      padding: 4px 12px;
      margin-left: 0;
    }
    .date-lotus {
      font-size: 13px;
      padding: 5px 16px;
      align-self: flex-start;
    }
    .search-input {
      padding: 14px 78px 14px 26px;
      font-size: 15px;
    }
    .search-btn {
      height: 44px;
      padding: 0 22px;
      font-size: 13px;
    }
    .weather-block {
      padding: 16px 20px;
      margin-bottom: 18px;
    }
    .weather-main-row {
      gap: 14px;
    }
    .weather-icon {
      font-size: 48px;
    }
    .weather-temp {
      font-size: 46px;
    }
    .weather-temp small {
      font-size: 24px;
    }
    .weather-desc {
      font-size: 16px;
      padding: 4px 18px;
    }
    .weather-meta {
      margin-top: 12px;
      justify-content: center;
      gap: 10px;
    }
    .poetry-block {
      padding: 14px 20px;
    }
    .poetry-text {
      font-size: 14px;
    }
  }
  
  @media (max-width: 480px) {
    .time-digits {
      font-size: 48px;
    }
    .seconds-pill {
      font-size: 14px;
    }
    .weather-icon {
      font-size: 42px;
    }
    .weather-temp {
      font-size: 40px;
    }
    .weather-desc {
      font-size: 14px;
    }
  }
  
  input, textarea {
    autocomplete: off;
    autocorrect: off;
    autocapitalize: off;
    spellcheck: false;
  }
</style>
</head>
<body>
<div class="bg-orb-left"></div>

<div class="glass-panel">
  <!-- 时间卡片：时:分 与 秒在右下角 -->
  <div class="time-block glass-card">
    <div class="time-main">
      <span class="time-digits" id="clockDisplay">--:--</span>
      <span class="seconds-pill" id="secondsDisplay">--</span>
    </div>
    <div class="date-lotus" id="dateDisplay">--/-- 星期—</div>
  </div>

  <!-- 搜索卡片 -->
  <div class="search-block glass-card">
    <form class="search-form" onsubmit="handleSearch(event)" autocomplete="off">
      <input type="text" id="searchInput" class="search-input" placeholder="搜索诗句、知识、万物 ···" autofocus autocomplete="off" />
      <button type="submit" class="search-btn">搜 索</button>
    </form>
  </div>

  <!-- 天气卡片 -->
  <div class="weather-block glass-card" id="weatherWidget">
    <div class="weather-main-row">
      <span class="weather-icon" id="weatherIcon">🍃</span>
      <span class="weather-temp" id="weatherTemp">--<small>°C</small></span>
      <span class="weather-desc" id="weatherDesc">云天感应</span>
    </div>
    <div class="weather-meta">
      <div class="weather-location">
        <span>📍</span><span id="weatherLocation">获取位置中...</span>
      </div>
      <div class="weather-update" id="weatherUpdate">自动定位天气</div>
    </div>
  </div>

  <!-- 诗句卡片 -->
  <div class="poetry-block">
    <div class="poetry-text" id="poemLine">—— 诗意向晚 ——</div>
  </div>
</div>

<script>
  // ======================= 诗词库 (风物志) =======================
  const poemLibrary = [
    "春眠不觉晓，处处闻啼鸟。夜来风雨声，花落知多少。",
    "人间四月芳菲尽，山寺桃花始盛开。长恨春归无觅处，不知转入此中来。",
    "明月松间照，清泉石上流。竹喧归浣女，莲动下渔舟。",
    "采菊东篱下，悠然见南山。山气日夕佳，飞鸟相与还。",
    "海内存知己，天涯若比邻。无为在歧路，儿女共沾巾。",
    "会当凌绝顶，一览众山小。造化钟神秀，阴阳割昏晓。",
    "无边落木萧萧下，不尽长江滚滚来。万里悲秋常作客，百年多病独登台。",
    "长风破浪会有时，直挂云帆济沧海。",
    "月上柳梢头，人约黄昏后。",
    "云想衣裳花想容，春风拂槛露华浓。若非群玉山头见，会向瑶台月下逢。",
    "此时相望不相闻，愿逐月华流照君。",
    "山重水复疑无路，柳暗花明又一村。箫鼓追随春社近，衣冠简朴古风存。",
    "夜阑卧听风吹雨，铁马冰河入梦来。",
    "无可奈何花落去，似曾相识燕归来。小园香径独徘徊。",
    "落霞与孤鹜齐飞，秋水共长天一色。渔舟唱晚，响穷彭蠡之滨。",
    "欲穷千里目，更上一层楼。",
    "迟日江山丽，春风花草香。泥融飞燕子，沙暖睡鸳鸯。",
    "小荷才露尖尖角，早有蜻蜓立上头。",
    "停车坐爱枫林晚，霜叶红于二月花。",
    "孤舟蓑笠翁，独钓寒江雪。",
    "竹外桃花三两枝，春江水暖鸭先知。蒌蒿满地芦芽短，正是河豚欲上时。",
    "草长莺飞二月天，拂堤杨柳醉春烟。儿童散学归来早，忙趁东风放纸鸢。",
    "黄梅时节家家雨，青草池塘处处蛙。有约不来过夜半，闲敲棋子落灯花。",
    "忽如一夜春风来，千树万树梨花开。散入珠帘湿罗幕，狐裘不暖锦衾薄。",
    "日出江花红胜火，春来江水绿如蓝。能不忆江南？",
    "一道残阳铺水中，半江瑟瑟半江红。可怜九月初三夜，露似真珠月似弓。",
    "两岸猿声啼不住，轻舟已过万重山。",
    "朝辞白帝彩云间，千里江陵一日还。",
    "野旷天低树，江清月近人。",
    "星垂平野阔，月涌大江流。",
    "白日依山尽，黄河入海流。",
    "千山鸟飞绝，万径人踪灭。",
    "相看两不厌，只有敬亭山。",
    "不识庐山真面目，只缘身在此山中。",
    "飞流直下三千尺，疑是银河落九天。",
    "两岸青山相对出，孤帆一片日边来。",
    "黄河远上白云间，一片孤城万仞山。羌笛何须怨杨柳，春风不度玉门关。",
    "三万里河东入海，五千仞岳上摩天。遗民泪尽胡尘里，南望王师又一年。",
    "天苍苍，野茫茫，风吹草低见牛羊。",
    "绿树村边合，青山郭外斜。开轩面场圃，把酒话桑麻。",
    "空山不见人，但闻人语响。返景入深林，复照青苔上。",
    "深林人不知，明月来相照。",
    "人生若只如初见，何事秋风悲画扇。等闲变却故人心，却道故人心易变。",
    "当时只道是寻常，如今却忆江南乐。",
    "此情可待成追忆，只是当时已惘然。",
    "问君能有几多愁，恰似一江春水向东流。",
    "衣带渐宽终不悔，为伊消得人憔悴。",
    "众里寻他千百度，蓦然回首，那人却在灯火阑珊处。",
    "莫听穿林打叶声，何妨吟啸且徐行。竹杖芒鞋轻胜马，谁怕？一蓑烟雨任平生。",
    "回首向来萧瑟处，归去，也无风雨也无晴。",
    "人有悲欢离合，月有阴晴圆缺，此事古难全。但愿人长久，千里共婵娟。"
  ];

  // ========== 1. 时钟与日期 + 秒数 ==========
  function updateClockAndDate() {
    const now = new Date();
    const hours = now.getHours().toString().padStart(2, '0');
    const minutes = now.getMinutes().toString().padStart(2, '0');
    const seconds = now.getSeconds().toString().padStart(2, '0');
    document.getElementById('clockDisplay').innerText = `${hours}:${minutes}`;
    document.getElementById('secondsDisplay').innerText = seconds;
    
    const month = (now.getMonth() + 1).toString().padStart(2, '0');
    const day = now.getDate().toString().padStart(2, '0');
    const weekdayRaw = now.toLocaleDateString('zh-CN', { weekday: 'short' });
    const weekday = weekdayRaw.replace('周', '星期');
    document.getElementById('dateDisplay').innerText = `${month}/${day} ${weekday}`;
  }
  setInterval(updateClockAndDate, 1000);
  updateClockAndDate();

  // ========== 2. 诗词刷新 ==========
  let currentPoemIdx = Math.floor(Math.random() * poemLibrary.length);
  function refreshPoem() {
    const poemEl = document.getElementById('poemLine');
    let newIdx = Math.floor(Math.random() * poemLibrary.length);
    if (newIdx === currentPoemIdx) newIdx = (newIdx + 1) % poemLibrary.length;
    currentPoemIdx = newIdx;
    const newPoem = poemLibrary[currentPoemIdx];
    poemEl.style.opacity = '0.4';
    setTimeout(() => {
      poemEl.innerText = newPoem;
      poemEl.style.opacity = '1';
    }, 120);
    setTimeout(() => poemEl.style.opacity = '', 200);
  }
  document.getElementById('poemLine').innerText = poemLibrary[currentPoemIdx];
  setInterval(refreshPoem, 50 * 60 * 1000);
  
  // ========== 3. 天气 IP 定位 + Open-Meteo ==========
  const weatherIconSpan = document.getElementById('weatherIcon');
  const weatherTempSpan = document.getElementById('weatherTemp');
  const weatherDescSpan = document.getElementById('weatherDesc');
  const weatherLocationSpan = document.getElementById('weatherLocation');
  const weatherUpdateSpan = document.getElementById('weatherUpdate');

  function mapWeatherCodeWMO(code) {
    const map = {
      0: { txt: "晴", emoji: "☀️" }, 1: { txt: "晴", emoji: "🌤️" }, 2: { txt: "局部多云", emoji: "⛅" },
      3: { txt: "多云", emoji: "☁️" }, 45: { txt: "雾", emoji: "🌫️" }, 48: { txt: "雾", emoji: "🌫️" },
      51: { txt: "毛毛雨", emoji: "🌦️" }, 53: { txt: "小雨", emoji: "🌧️" }, 55: { txt: "中雨", emoji: "🌧️" },
      56: { txt: "冻雨", emoji: "❄️" }, 57: { txt: "冻雨", emoji: "❄️" }, 61: { txt: "小雨", emoji: "🌦️" },
      63: { txt: "中雨", emoji: "🌧️" }, 65: { txt: "大雨", emoji: "🌧️" }, 66: { txt: "冻雨", emoji: "❄️" },
      67: { txt: "大雪", emoji: "❄️" }, 71: { txt: "小雪", emoji: "❄️" }, 73: { txt: "中雪", emoji: "❄️" },
      75: { txt: "大雪", emoji: "❄️" }, 77: { txt: "阵雪", emoji: "❄️" }, 80: { txt: "阵雨", emoji: "🌦️" },
      81: { txt: "中阵雨", emoji: "🌧️" }, 82: { txt: "大阵雨", emoji: "🌧️" }, 85: { txt: "小雪", emoji: "❄️" },
      86: { txt: "大雪", emoji: "❄️" }, 95: { txt: "雷雨", emoji: "⛈️" }, 96: { txt: "雷雨", emoji: "⛈️" },
      99: { txt: "雷雨", emoji: "⛈️" }
    };
    return map[code] || { txt: "风清气和", emoji: "🍃" };
  }

  async function fetchWeatherByIP() {
    try {
      weatherTempSpan.innerHTML = "--<small>°C</small>";
      weatherDescSpan.innerText = "感应天候";
      weatherIconSpan.innerText = "☁️";
      weatherLocationSpan.innerText = "定位城市...";
      
      const geoRes = await fetch('https://ipapi.co/json/');
      if (!geoRes.ok) throw new Error('IP定位失败');
      const geo = await geoRes.json();
      const city = geo.city || geo.region || "未知地区";
      const region = geo.region;
      let locationDisplay = city;
      if (region && region !== city) locationDisplay = `${city}·${region}`;
      else locationDisplay = locationDisplay || "当前位置";
      const lat = geo.latitude;
      const lon = geo.longitude;
      if (!lat || !lon) throw new Error('经纬度无效');
      weatherLocationSpan.innerText = `📍 ${locationDisplay}`;
      
      const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=auto`;
      const wRes = await fetch(weatherUrl);
      if (!wRes.ok) throw new Error('天气服务异常');
      const wData = await wRes.json();
      if (wData && wData.current && wData.current.temperature_2m !== undefined) {
        const temp = Math.round(wData.current.temperature_2m);
        const code = wData.current.weather_code;
        const humidity = wData.current.relative_humidity_2m;
        const wind = wData.current.wind_speed_10m;
        const { txt, emoji } = mapWeatherCodeWMO(code);
        weatherTempSpan.innerHTML = `${temp}<small>°C</small>`;
        weatherDescSpan.innerText = txt;
        weatherIconSpan.innerText = emoji;
        let extra = "";
        if (humidity !== undefined) extra += `💧${humidity}% `;
        if (wind !== undefined) extra += `🍃${Math.round(wind)}km/h`;
        const nowTime = new Date();
        const timeStr = `${nowTime.getHours().toString().padStart(2,'0')}:${nowTime.getMinutes().toString().padStart(2,'0')}`;
        weatherUpdateSpan.innerText = `⏱️ ${timeStr} ${extra ? `· ${extra}` : "· 正好风来"}`;
      } else throw new Error('天气数据无效');
    } catch (err) {
      console.warn("天气降级:", err);
      weatherTempSpan.innerHTML = "--<small>°C</small>";
      weatherDescSpan.innerText = "风物之诗";
      weatherIconSpan.innerText = "🍃";
      weatherLocationSpan.innerText = "📍 未获取位置";
      weatherUpdateSpan.innerText = "可刷新重试";
    }
  }
  fetchWeatherByIP();
  setInterval(fetchWeatherByIP, 30 * 60 * 1000);
  
  function refreshTimestampOnly() {
    const updSpan = weatherUpdateSpan;
    if (updSpan && !updSpan.innerText.includes("未获取") && !updSpan.innerText.includes("可刷新")) {
      const now = new Date();
      const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
      let extraPart = "";
      if (updSpan.innerText.includes("·")) {
        const parts = updSpan.innerText.split("·");
        if (parts.length > 1) extraPart = "· " + parts[1];
      }
      updSpan.innerText = `⏱️ ${timeStr}  ${extraPart}`;
    }
  }
  setInterval(refreshTimestampOnly, 60000);
  
  // ========== 4. 搜索与返回自动清空 ==========
  const searchInput = document.getElementById('searchInput');
  window.addEventListener('pageshow', () => { if (searchInput) searchInput.value = ''; });
  document.addEventListener('visibilitychange', () => { if (!document.hidden && searchInput) searchInput.value = ''; });
  
  function handleSearch(e) {
    e.preventDefault();
    let query = searchInput.value.trim();
    if (query === "") {
      searchInput.placeholder = "✨ 寻一抹青柠诗意 ✨";
      refreshPoem();
      setTimeout(() => {
        if (searchInput.placeholder === "✨ 寻一抹青柠诗意 ✨") 
          searchInput.placeholder = "搜索诗句、知识、万物 ···";
      }, 1500);
      return;
    }
    window.open(`https://www.baidu.com/s?wd=${encodeURIComponent(query)}`, '_blank');
    const btn = document.querySelector('.search-btn');
    if (btn) { btn.style.transform = "scale(0.96)"; setTimeout(() => btn.style.transform = "", 120); }
  }
  
  document.addEventListener('keydown', (ev) => {
    const active = document.activeElement;
    if (active && active.id === 'searchInput') return;
    if (ev.key === 'r' || ev.key === 'R') {
      ev.preventDefault();
      refreshPoem();
      const poemCard = document.querySelector('.poetry-block');
      if (poemCard) poemCard.style.background = "rgba(225, 245, 200, 0.7)";
      setTimeout(() => poemCard.style.background = "", 200);
    }
    if (ev.key === 'Escape' && active && active.id === 'searchInput') { active.value = ""; ev.preventDefault(); }
  });
  
  if (searchInput) {
    searchInput.addEventListener('focus', (e) => e.target.select());
    searchInput.setAttribute('autocomplete', 'off');
    searchInput.setAttribute('name', 'no_history_' + Date.now());
  }
  
  document.body.style.overflow = 'hidden';
  window.addEventListener('load', () => {
    updateClockAndDate();
    fetchWeatherByIP();
  });
</script>
</body>

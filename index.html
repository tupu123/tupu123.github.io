<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Go!</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="white"/><path d="M12 48V16C12 12 16 10 20 10h24c4 0 8 2 8 6v32Z" fill="none" stroke="%232c2c2c" stroke-width="3"/><line x1="32" y1="14" x2="32" y2="44" stroke="%232c2c2c"/><circle cx="32" cy="34" r="6" fill="none" stroke="%232c2c2c"/><line x1="32" y1="28" x2="32" y2="40" stroke="%232c2c2c"/><line x1="26" y1="34" x2="38" y2="34" stroke="%232c2c2c"/><polygon points="32,14 38,18 32,22" fill="%232c2c2c"/></svg>' />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/qweather-icons@1.3.0/font/qweather-icons.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    height: 100vh; width: 100vw; overflow: hidden;
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: radial-gradient(circle at 20% 30%, #e2e9f0, #c5ced9);
    display: flex; align-items: center; justify-content: center; padding: 20px; position: relative;
  }
  body::before {
    content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-image: radial-gradient(circle at 30% 45%, rgba(210, 225, 200, 0.2) 1.2px, transparent 1px),
                      radial-gradient(circle at 70% 60%, rgba(180, 200, 160, 0.15) 1px, transparent 1px);
    background-size: 48px 48px, 32px 32px; background-position: 0 0, 20px 30px;
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: ""; position: fixed; top: 10%; right: -8%; width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(180, 210, 150, 0.25), rgba(160, 190, 130, 0));
    border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0;
  }
  .bg-orb-left {
    position: fixed; bottom: -5%; left: -10%; width: 380px; height: 380px;
    background: radial-gradient(circle, rgba(170, 210, 140, 0.2), rgba(140, 180, 110, 0));
    border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0;
  }
  .glass-panel {
    width: 100%; max-width: 1080px; height: auto; max-height: 94vh;
    background: rgba(245, 250, 240, 0.3); backdrop-filter: blur(24px) saturate(180%);
    border-radius: 64px; border: 1px solid rgba(255, 255, 245, 0.65);
    box-shadow: 0 32px 56px rgba(0, 0, 0, 0.08), inset 0 1px 0.6px rgba(255, 255, 245, 0.8);
    padding: 28px 32px 36px; display: flex; flex-direction: column; justify-content: flex-start;
    overflow-y: auto; scrollbar-width: none; position: relative; z-index: 2;
  }
  .glass-panel::-webkit-scrollbar { display: none; }
  .glass-card {
    background: rgba(255, 255, 252, 0.86); backdrop-filter: blur(14px);
    border-radius: 56px; border: 1px solid rgba(210, 225, 190, 0.7);
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.03), inset 0 1px 0 rgba(255,255,240,0.9);
    transition: all 0.2s ease;
  }
  /* 时间区域 */
  .time-block { margin-bottom: 20px; padding: 16px 28px; display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .time-main { display: flex; align-items: baseline; gap: 4px; }
  .time-digits { font-size: 72px; font-weight: 620; letter-spacing: 4px; line-height: 1.1; background: linear-gradient(135deg, #2c4a3b, #4a7058); background-clip: text; -webkit-background-clip: text; color: transparent; }
  .seconds-pill { font-size: 18px; font-weight: 500; background: rgba(200, 220, 175, 0.5); backdrop-filter: blur(6px); padding: 5px 14px; border-radius: 60px; color: #3a684a; border: 0.2px solid rgba(170, 200, 140, 0.6); display: inline-flex; align-items: center; gap: 3px; margin-left: 12px; }
  .date-lotus { font-size: 16px; font-weight: 500; color: #3a5a48; background: rgba(220, 238, 200, 0.65); padding: 6px 20px; border-radius: 100px; backdrop-filter: blur(4px); letter-spacing: 0.6px; }
  
  /* 搜索框 */
  .search-block { margin-bottom: 20px; }
  .search-form { position: relative; display: flex; align-items: center; width: 100%; }
  .search-input { width: 100%; padding: 16px 100px 16px 30px; font-size: 16px; background: rgba(255, 255, 245, 0.96); border: 1px solid rgba(185, 210, 155, 0.7); border-radius: 100px; outline: none; color: #2a4236; transition: all 0.2s ease; }
  .search-input:focus { background: #fff; border-color: #9bc47c; box-shadow: 0 6px 16px rgba(100, 140, 70, 0.12), 0 0 0 3px rgba(155, 196, 124, 0.35); }
  .search-btn { position: absolute; right: 10px; height: 46px; padding: 0 28px; border-radius: 100px; border: none; background: rgba(155, 196, 124, 0.25); backdrop-filter: blur(8px); font-size: 14px; font-weight: 580; color: #356e3a; cursor: pointer; transition: all 0.2s; }
  .search-btn:hover { background: rgba(130, 175, 100, 0.45); transform: scale(0.96); }

  /* 主要天气卡片优化布局：左侧实时气象 + 右侧扩展指标 */
  .weather-main-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    margin-bottom: 18px;
  }
  .primary-weather-card {
    flex: 2;
    min-width: 200px;
    padding: 18px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .weather-main-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 15px;
  }
  .weather-icon-temp {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .weather-icon { font-size: 3rem; color: #4a7058; line-height: 1; }
  .weather-temp { font-size: 58px; font-weight: 640; line-height: 1; color: #2a4a3a; }
  .weather-temp small { font-size: 28px; font-weight: 500; }
  .weather-desc { font-size: 20px; font-weight: 520; background: rgba(225, 240, 205, 0.7); backdrop-filter: blur(4px); padding: 6px 22px; border-radius: 60px; color: #426a50; white-space: nowrap; }
  .weather-meta-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 8px;
    padding-top: 12px;
    border-top: 1px solid rgba(140, 170, 110, 0.3);
  }
  .weather-location { display: flex; align-items: center; gap: 6px; font-size: 14px; background: rgba(225, 240, 205, 0.65); padding: 5px 16px; border-radius: 40px; color: #3a6048; cursor: pointer; position: relative; }
  .location-edit { cursor: pointer; font-size: 12px; opacity: 0.7; margin-left: 4px; }
  .weather-update { font-size: 12px; background: rgba(225, 240, 205, 0.6); padding: 5px 16px; border-radius: 40px; opacity: 0.8; cursor: pointer; transition: all 0.2s; }

  /* 右侧扩展指标网格 (分钟降水，空气质量，预警，指数) 新布局紧凑且美观 */
  .extended-metrics {
    flex: 1.5;
    min-width: 240px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    background: rgba(255, 255, 250, 0.75);
    backdrop-filter: blur(12px);
    border-radius: 48px;
    padding: 16px 18px;
    border: 1px solid rgba(200, 220, 175, 0.7);
    align-content: center;
  }
  .metric-item {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    background: rgba(240, 248, 235, 0.6);
    padding: 10px 12px;
    border-radius: 28px;
    backdrop-filter: blur(4px);
    transition: 0.1s;
  }
  .metric-label {
    font-size: 12px;
    font-weight: 500;
    color: #587a62;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .metric-value {
    font-size: 20px;
    font-weight: 620;
    color: #2b4a38;
    line-height: 1.2;
  }
  .metric-sub {
    font-size: 11px;
    color: #6f8f75;
  }
  .warning-badge {
    background: rgba(230, 160, 100, 0.2);
    border-radius: 30px;
    padding: 2px 10px;
    font-size: 12px;
    color: #b4622a;
    display: inline-block;
  }
  .indicator-badge {
    font-size: 13px;
    font-weight: 500;
  }
  
  /* 诗词卡 */
  .poetry-block { margin-top: 12px; padding: 18px 26px; background: rgba(255, 255, 252, 0.88); border-radius: 56px; border: 1px solid rgba(210, 225, 190, 0.7); }
  .poetry-text { font-size: 16px; line-height: 1.5; text-align: center; color: #2c4a3a; letter-spacing: 0.3px; }

  .city-suggestions { position: absolute; bottom: 100%; left: 0; right: 0; background: rgba(255, 255, 245, 0.98); backdrop-filter: blur(16px); border-radius: 20px; margin-bottom: 8px; padding: 6px 0; z-index: 100; box-shadow: 0 8px 20px rgba(0,0,0,0.12); max-height: 200px; overflow-y: auto; border: 1px solid rgba(185, 210, 155, 0.7); }
  .suggestion-item { padding: 8px 16px; cursor: pointer; font-size: 13px; color: #2c4a3a; }
  .suggestion-item:hover { background: rgba(155, 196, 124, 0.2); }
  .weather-loading { animation: subtlePulse 1.2s infinite; }
  @keyframes subtlePulse { 0% { opacity: 0.7; } 100% { opacity: 1; } }
  
  @media (max-width: 780px) {
    .glass-panel { padding: 22px 20px 28px; }
    .time-digits { font-size: 52px; }
    .weather-temp { font-size: 44px; }
    .weather-temp small { font-size: 22px; }
    .weather-icon { font-size: 2.4rem; }
    .extended-metrics { grid-template-columns: 1fr; gap: 10px; }
    .metric-value { font-size: 18px; }
    .primary-weather-card { padding: 14px 18px; }
    .weather-desc { font-size: 16px; white-space: normal; }
  }
  @media (min-width: 1200px) {
    .glass-panel { max-width: 1100px; }
    .weather-temp { font-size: 68px; }
  }
  .qi-fallback { opacity: 0.7; }
</style>
</head>
<body>
<div class="bg-orb-left"></div>
<div class="glass-panel">
  <div class="time-block glass-card">
    <div class="time-main"><span class="time-digits" id="clockDisplay">--:--</span><span class="seconds-pill" id="secondsDisplay">--</span></div>
    <div class="date-lotus" id="dateDisplay">--/-- 星期—</div>
  </div>
  <div class="search-block glass-card">
    <form class="search-form" onsubmit="handleSearch(event)" autocomplete="off">
      <input type="text" id="searchInput" class="search-input" placeholder="搜索诗句、知识、万物 ···" autofocus autocomplete="off" />
      <button type="submit" class="search-btn">搜 索</button>
    </form>
  </div>

  <!-- 新的天气布局：主区域 + 扩展指标(分钟降水,空气质量,预警,指数) -->
  <div class="weather-main-grid">
    <!-- 左侧主要天气卡片 -->
    <div class="primary-weather-card glass-card" id="weatherPrimary">
      <div class="weather-main-row">
        <div class="weather-icon-temp">
          <i class="weather-icon" id="weatherIcon"></i>
          <span class="weather-temp" id="weatherTemp">--<small>°C</small></span>
        </div>
        <span class="weather-desc" id="weatherDesc">加载中...</span>
      </div>
      <div class="weather-meta-bar">
        <div class="weather-location" id="locationContainer">
          <span>📍</span><span id="locationDisplay" class="location-display">济南</span><span class="location-edit" id="locationEditBtn" title="修改城市">✎</span>
          <div id="citySuggestions" class="city-suggestions" style="display: none;"></div>
        </div>
        <div class="weather-update" id="weatherUpdate" onclick="refreshWeather()">⏱️ 点击刷新</div>
      </div>
    </div>

    <!-- 右侧扩展：分钟降水、空气质量、天气预警、天气指数 -->
    <div class="extended-metrics" id="extendedMetrics">
      <div class="metric-item" id="minPrecipItem">
        <div class="metric-label"><i class="qi-306" style="font-size: 14px;"></i> 分钟降水</div>
        <div class="metric-value" id="minPrecipVal">-- mm</div>
        <div class="metric-sub" id="minPrecipSub">近24h峰值</div>
      </div>
      <div class="metric-item" id="airQualityItem">
        <div class="metric-label"><i class="qi-500" style="font-size: 14px;"></i> 空气质量</div>
        <div class="metric-value" id="airQualityVal">--</div>
        <div class="metric-sub" id="airQualityDesc">指数 · 待获取</div>
      </div>
      <div class="metric-item" id="warningItem">
        <div class="metric-label"><i class="qi-155" style="font-size: 14px;"></i> 天气预警</div>
        <div class="metric-value" id="warningVal">暂无预警</div>
        <div class="metric-sub" id="warningSub">实时</div>
      </div>
      <div class="metric-item" id="indicesItem">
        <div class="metric-label"><i class="qi-201" style="font-size: 14px;"></i> 天气指数</div>
        <div class="metric-value" id="indicesVal">舒适</div>
        <div class="metric-sub" id="indicesSub">穿衣/紫外线</div>
      </div>
    </div>
  </div>

  <div class="poetry-block"><div class="poetry-text" id="poemLine">—— 诗意向晚 ——</div></div>
</div>

<script src="https://sdk.jinrishici.com/v2/browser/jinrishici.js" charset="utf-8"></script>
<script>
  // ========== 和风天气配置 ==========
  const MY_API_HOST = 'https://na6yw2gd3y.re.qweatherapi.com';
  const MY_API_KEY = '93d3ffa7628d4d6aa31deb616c4fd06a';
  
  const GEO_API = `${MY_API_HOST}/geo/v2/city/lookup`;
  const WEATHER_API = `${MY_API_HOST}/v7/weather/now`;
  const MINUTE_PRECIP_API = `${MY_API_HOST}/v7/minutely/5m`;      // 分钟降水 (最近2小时)
  const AIR_QUALITY_API = `${MY_API_HOST}/v7/air/now`;            // 空气质量实时
  const WARNING_API = `${MY_API_HOST}/v7/warning/now`;            // 气象预警
  const INDICES_API = `${MY_API_HOST}/v7/indices/1d`;             // 天气指数 (生活指数)
  
  let currentCity = localStorage.getItem('qweather_city') || '';
  let currentLocationId = localStorage.getItem('qweather_location_id') || '';
  let isEditing = false;
  let searchTimeout = null;
  
  function getWeatherIconClass(code) { return `qi-${code}`; }
  
  // 时钟
  function updateClockAndDate() {
    const now = new Date();
    document.getElementById('clockDisplay').innerText = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    document.getElementById('secondsDisplay').innerText = now.getSeconds().toString().padStart(2,'0');
    const month = (now.getMonth()+1).toString().padStart(2,'0');
    const day = now.getDate().toString().padStart(2,'0');
    const weekday = now.toLocaleDateString('zh-CN', { weekday: 'short' }).replace('周', '星期');
    document.getElementById('dateDisplay').innerText = `${month}/${day} ${weekday}`;
  }
  setInterval(updateClockAndDate, 1000);
  updateClockAndDate();

  // 诗词
  const poemEl = document.getElementById('poemLine');
  function refreshPoem() {
    poemEl.style.opacity = '0.4';
    jinrishici.load(result => {
      poemEl.innerText = result.data.content;
      poemEl.style.opacity = '1';
    });
  }
  refreshPoem();
  setInterval(refreshPoem, 50 * 60 * 1000);
  
  // UI元素绑定
  const locationDisplaySpan = document.getElementById('locationDisplay');
  const locationContainerDiv = document.getElementById('locationContainer');
  const suggestionsDiv = document.getElementById('citySuggestions');
  const weatherIconSpan = document.getElementById('weatherIcon');
  const weatherTempSpan = document.getElementById('weatherTemp');
  const weatherDescSpan = document.getElementById('weatherDesc');
  const weatherUpdateSpan = document.getElementById('weatherUpdate');
  
  // 扩展指标元素
  const minPrecipVal = document.getElementById('minPrecipVal');
  const minPrecipSub = document.getElementById('minPrecipSub');
  const airQualityVal = document.getElementById('airQualityVal');
  const airQualityDesc = document.getElementById('airQualityDesc');
  const warningVal = document.getElementById('warningVal');
  const warningSub = document.getElementById('warningSub');
  const indicesVal = document.getElementById('indicesVal');
  const indicesSub = document.getElementById('indicesSub');
  
  function setWeatherIconPlaceholder() { weatherIconSpan.className = 'weather-icon qi-999'; weatherIconSpan.style.opacity = '0.6'; }
  function setWeatherIcon(code) { weatherIconSpan.className = `weather-icon ${getWeatherIconClass(code)}`; weatherIconSpan.style.opacity = '1'; }
  
  // 城市搜索下拉
  async function searchCitySuggestions(keyword) {
    if (!keyword || keyword.length < 1) { suggestionsDiv.style.display = 'none'; return; }
    try {
      const url = `${GEO_API}?location=${encodeURIComponent(keyword)}&key=${MY_API_KEY}`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.code === '200' && data.location?.length) {
        suggestionsDiv.style.display = 'block';
        suggestionsDiv.innerHTML = data.location.slice(0,6).map(loc => `<div class="suggestion-item" onmousedown="selectCity('${loc.name.replace(/'/g, "\\'")}', '${loc.id}')">${loc.name}${loc.adm1 ? ` · ${loc.adm1}` : ''}</div>`).join('');
      } else { suggestionsDiv.style.display = 'none'; }
    } catch(err) { suggestionsDiv.style.display = 'none'; }
  }
  window.selectCity = function(cityName, locationId) {
    currentCity = cityName;
    currentLocationId = locationId;
    localStorage.setItem('qweather_city', cityName);
    localStorage.setItem('qweather_location_id', locationId);
    suggestionsDiv.style.display = 'none';
    exitEditMode(cityName);
    getAllWeatherData();
  };
  function enterEditMode() {
    if (isEditing) return;
    isEditing = true;
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'location-input';
    input.value = currentCity || '';
    input.placeholder = '输入城市名';
    input.autocomplete = 'off';
    locationDisplaySpan.style.display = 'none';
    locationContainerDiv.insertBefore(input, document.getElementById('locationEditBtn'));
    input.focus();
    input.addEventListener('input', (e) => { if(searchTimeout) clearTimeout(searchTimeout); searchTimeout = setTimeout(() => searchCitySuggestions(e.target.value.trim()), 300); });
    input.addEventListener('blur', () => { setTimeout(() => { if(isEditing) exitEditMode(input.value); }, 200); });
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') exitEditMode(input.value); if(e.key === 'Escape') exitEditMode(currentCity); });
  }
  function exitEditMode(inputValue) {
    isEditing = false;
    suggestionsDiv.style.display = 'none';
    const input = locationContainerDiv.querySelector('.location-input');
    if(input) input.remove();
    locationDisplaySpan.style.display = 'inline';
    if(inputValue && inputValue.trim() && inputValue.trim() !== currentCity) {
      currentCity = inputValue.trim();
      currentLocationId = '';
      localStorage.setItem('qweather_city', currentCity);
      localStorage.removeItem('qweather_location_id');
      locationDisplaySpan.innerText = currentCity;
      getAllWeatherData();
    } else if(currentCity) locationDisplaySpan.innerText = currentCity;
    else locationDisplaySpan.innerText = '点击输入城市';
  }
  
  // 核心: 并行请求所有扩展数据 (分钟降水/空气质量/预警/指数 + 实况天气)
  async function getAllWeatherData() {
    if (!currentCity) {
      locationDisplaySpan.innerText = '点击输入城市';
      weatherTempSpan.innerHTML = "--<small>°C</small>";
      weatherDescSpan.innerText = "请输入城市";
      setWeatherIconPlaceholder();
      resetExtendedMetrics();
      return;
    }
    locationDisplaySpan.innerText = currentCity;
    document.getElementById('weatherPrimary').classList.add('weather-loading');
    setWeatherIconPlaceholder();
    try {
      let locationId = currentLocationId;
      if (!locationId) {
        const geoRes = await fetch(`${GEO_API}?location=${encodeURIComponent(currentCity)}&key=${MY_API_KEY}`);
        const geoData = await geoRes.json();
        if (geoData.code === '200' && geoData.location?.length) {
          const loc = geoData.location[0];
          currentCity = loc.name;
          locationId = loc.id;
          currentLocationId = locationId;
          localStorage.setItem('qweather_city', currentCity);
          localStorage.setItem('qweather_location_id', locationId);
          locationDisplaySpan.innerText = currentCity;
        } else throw new Error('城市未找到');
      }
      // 并发调用所有接口 (实时天气 必须)
      const weatherUrl = `${WEATHER_API}?location=${locationId}&key=${MY_API_KEY}`;
      const minuteUrl = `${MINUTE_PRECIP_API}?location=${locationId}&key=${MY_API_KEY}`;
      const airUrl = `${AIR_QUALITY_API}?location=${locationId}&key=${MY_API_KEY}`;
      const warningUrl = `${WARNING_API}?location=${locationId}&key=${MY_API_KEY}`;
      const indicesUrl = `${INDICES_API}?type=1,2,3&location=${locationId}&key=${MY_API_KEY}`; // 常用指数
      
      const [weatherRes, minuteRes, airRes, warningRes, indicesRes] = await Promise.allSettled([
        fetch(weatherUrl), fetch(minuteUrl), fetch(airUrl), fetch(warningUrl), fetch(indicesUrl)
      ]);
      
      // 解析实时天气
      if (weatherRes.status === 'fulfilled') {
        const weatherData = await weatherRes.value.json();
        if(weatherData.code === '200' && weatherData.now) {
          const now = weatherData.now;
          const temp = Math.round(parseFloat(now.temp));
          const code = now.icon;
          setWeatherIcon(code);
          weatherTempSpan.innerHTML = `${temp}<small>°C</small>`;
          weatherDescSpan.innerText = now.text || "晴";
          const timeStr = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
          weatherUpdateSpan.innerText = `⏱️ ${timeStr} · 实时`;
        } else throw new Error('天气接口异常');
      } else { throw new Error('天气数据失败'); }
      
      // 分钟降水
      if(minuteRes.status === 'fulfilled' && minuteRes.value.ok) {
        const precipData = await minuteRes.value.json();
        if(precipData.code === '200' && precipData.minutely?.length) {
          const summary = precipData.summary || precipData.minutely[0]?.precip_1h;
          let maxPrecip = 0;
          precipData.minutely.forEach(m => { if(m.precip_10min > maxPrecip) maxPrecip = m.precip_10min; });
          minPrecipVal.innerText = maxPrecip > 0 ? `${maxPrecip.toFixed(1)} mm` : '无降水';
          minPrecipSub.innerText = `最近2h ${precipData.minutely.length}个时段`;
        } else { minPrecipVal.innerText = '-- mm'; minPrecipSub.innerText = '暂无分钟数据'; }
      } else { minPrecipVal.innerText = '--'; minPrecipSub.innerText = '无法获取'; }
      
      // 空气质量
      if(airRes.status === 'fulfilled' && airRes.value.ok) {
        const airData = await airRes.value.json();
        if(airData.code === '200' && airData.now) {
          const aqi = airData.now.aqi;
          const category = airData.now.category || '良';
          airQualityVal.innerText = aqi || '--';
          airQualityDesc.innerText = `${category} · PM2.5 ${airData.now.pm2p5 || '-'}`;
        } else { airQualityVal.innerText = 'N/A'; airQualityDesc.innerText = '空气质量未覆盖'; }
      } else { airQualityVal.innerText = '--'; airQualityDesc.innerText = '请求失败'; }
      
      // 预警
      if(warningRes.status === 'fulfilled' && warningRes.value.ok) {
        const warnData = await warningRes.value.json();
        if(warnData.code === '200' && warnData.warning?.length) {
          const firstWarn = warnData.warning[0];
          warningVal.innerText = firstWarn.title || '气象预警';
          warningSub.innerText = `${firstWarn.severity || '注意'} · ${firstWarn.status || '生效'}`;
        } else { warningVal.innerText = '暂无预警'; warningSub.innerText = '当前安全'; }
      } else { warningVal.innerText = '暂无'; warningSub.innerText = '未检索到'; }
      
      // 天气指数: 穿衣/紫外线/舒适度
      if(indicesRes.status === 'fulfilled' && indicesRes.value.ok) {
        const idxData = await indicesRes.value.json();
        if(idxData.code === '200' && idxData.daily?.length) {
          let uiText = '', subText = '';
          const uv = idxData.daily.find(i => i.type === '1'); // 紫外线
          const dressing = idxData.daily.find(i => i.type === '2'); // 穿衣
          if(uv) uiText = `紫外线: ${uv.category || uv.name}`;
          if(dressing) subText = `穿衣: ${dressing.category || dressing.name}`;
          indicesVal.innerText = uv ? uv.category?.split(' ')[0] || '中等' : '舒适';
          indicesSub.innerText = subText || '生活指数';
        } else { indicesVal.innerText = '温和'; indicesSub.innerText = '参考穿衣/紫外线'; }
      } else { indicesVal.innerText = '宜人'; indicesSub.innerText = '暂无指数'; }
      
    } catch(err) {
      console.error('综合天气获取失败:', err);
      weatherTempSpan.innerHTML = "--<small>°C</small>";
      weatherDescSpan.innerText = "获取失败";
      setWeatherIconPlaceholder();
      resetExtendedMetrics();
      weatherUpdateSpan.innerText = `⏱️ 稍后重试`;
    } finally {
      document.getElementById('weatherPrimary').classList.remove('weather-loading');
    }
  }
  
  function resetExtendedMetrics() {
    minPrecipVal.innerText = '-- mm'; minPrecipSub.innerText = '分钟降水';
    airQualityVal.innerText = '--'; airQualityDesc.innerText = '空气质量';
    warningVal.innerText = '等待更新'; warningSub.innerText = '预警信息';
    indicesVal.innerText = '--'; indicesSub.innerText = '天气指数';
  }
  
  window.refreshWeather = function() { if(currentCity) getAllWeatherData(); else enterEditMode(); };
  
  // 绑定事件
  document.getElementById('locationEditBtn').addEventListener('click', (e) => { e.stopPropagation(); enterEditMode(); });
  locationDisplaySpan.addEventListener('click', (e) => { e.stopPropagation(); enterEditMode(); });
  document.addEventListener('click', () => { suggestionsDiv.style.display = 'none'; });
  
  // 搜索百度
  function handleSearch(e) {
    e.preventDefault();
    let query = document.getElementById('searchInput').value.trim();
    if(query === ""){ refreshPoem(); return; }
    window.open(`https://www.baidu.com/s?wd=${encodeURIComponent(query)}`, '_blank');
  }
  
  document.addEventListener('keydown', (ev) => {
    if((ev.key === 'r' || ev.key === 'R') && document.activeElement?.id !== 'searchInput' && !document.activeElement?.classList?.contains('location-input')) {
      ev.preventDefault(); refreshPoem();
      const poemCard = document.querySelector('.poetry-block');
      if(poemCard) poemCard.style.background = "rgba(225, 245, 200, 0.7)";
      setTimeout(() => poemCard.style.background = "", 200);
    }
  });
  
  // 初始化：默认济南
  if(!currentCity) {
    currentCity = '济南';
    currentLocationId = '101120101';
    localStorage.setItem('qweather_city', currentCity);
    localStorage.setItem('qweather_location_id', currentLocationId);
  }
  locationDisplaySpan.innerText = currentCity;
  getAllWeatherData();
</script>
</body>
</html>

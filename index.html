<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>GO!</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="white"/><path d="M12 48V16C12 12 16 10 20 10h24c4 0 8 2 8 6v32Z" fill="none" stroke="%232c2c2c" stroke-width="3"/><line x1="32" y1="14" x2="32" y2="44" stroke="%232c2c2c"/><circle cx="32" cy="34" r="6" fill="none" stroke="%232c2c2c"/><line x1="32" y1="28" x2="32" y2="40" stroke="%232c2c2c"/><line x1="26" y1="34" x2="38" y2="34" stroke="%232c2c2c"/><polygon points="32,14 38,18 32,22" fill="%232c2c2c"/></svg>' />
<!-- 引入和风天气图标字体 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/qweather-icons@1.3.0/font/qweather-icons.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    height: 100vh; width: 100vw; overflow: hidden;
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: radial-gradient(circle at 20% 30%, #e2e9f0, #c5ced9);
    display: flex; align-items: center; justify-content: center; padding: 20px; position: relative;
  }
  body::before {
    content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-image: radial-gradient(circle at 30% 45%, rgba(210, 225, 200, 0.2) 1.2px, transparent 1px),
                      radial-gradient(circle at 70% 60%, rgba(180, 200, 160, 0.15) 1px, transparent 1px);
    background-size: 48px 48px, 32px 32px; background-position: 0 0, 20px 30px;
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: ""; position: fixed; top: 10%; right: -8%; width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(180, 210, 150, 0.25), rgba(160, 190, 130, 0));
    border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0;
  }
  .bg-orb-left {
    position: fixed; bottom: -5%; left: -10%; width: 380px; height: 380px;
    background: radial-gradient(circle, rgba(170, 210, 140, 0.2), rgba(140, 180, 110, 0));
    border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0;
  }
  .glass-panel {
    width: 100%; max-width: 800px; height: auto; max-height: 92vh;
    background: rgba(245, 250, 240, 0.3); backdrop-filter: blur(24px) saturate(180%);
    border-radius: 64px; border: 1px solid rgba(255, 255, 245, 0.65);
    box-shadow: 0 32px 56px rgba(0, 0, 0, 0.08), inset 0 1px 0.6px rgba(255, 255, 245, 0.8);
    padding: 34px 32px 44px; display: flex; flex-direction: column; justify-content: center;
    overflow-y: auto; scrollbar-width: none; position: relative; z-index: 2;
  }
  .glass-panel::-webkit-scrollbar { display: none; }
  .glass-card {
    background: rgba(255, 255, 252, 0.88); backdrop-filter: blur(14px);
    border-radius: 56px; border: 1px solid rgba(210, 225, 190, 0.7);
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.03), inset 0 1px 0 rgba(255,255,240,0.9);
    transition: all 0.2s ease;
  }
  .time-block { margin-bottom: 24px; padding: 20px 30px; display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .time-main { display: flex; align-items: baseline; gap: 4px; }
  .time-digits { font-size: 78px; font-weight: 620; letter-spacing: 6px; line-height: 1.1; background: linear-gradient(135deg, #2c4a3b, #4a7058); background-clip: text; -webkit-background-clip: text; color: transparent; }
  .seconds-pill { font-size: 19px; font-weight: 500; background: rgba(200, 220, 175, 0.5); backdrop-filter: blur(6px); padding: 6px 16px; border-radius: 60px; color: #3a684a; border: 0.2px solid rgba(170, 200, 140, 0.6); display: inline-flex; align-items: center; gap: 3px; white-space: nowrap; margin-left: 12px; }
  .date-lotus { font-size: 17px; font-weight: 500; color: #3a5a48; background: rgba(220, 238, 200, 0.65); padding: 8px 22px; border-radius: 100px; backdrop-filter: blur(4px); letter-spacing: 0.8px; border: 0.2px solid rgba(190, 215, 160, 0.6); }
  .search-block { margin-bottom: 24px; }
  .search-form { position: relative; display: flex; align-items: center; width: 100%; }
  .search-input { width: 100%; padding: 18px 100px 18px 34px; font-size: 17px; background: rgba(255, 255, 245, 0.96); border: 1px solid rgba(185, 210, 155, 0.7); border-radius: 100px; outline: none; color: #2a4236; transition: all 0.2s ease; }
  .search-input:focus { background: #fff; border-color: #9bc47c; box-shadow: 0 6px 16px rgba(100, 140, 70, 0.12), 0 0 0 3px rgba(155, 196, 124, 0.35); }
  .search-input::placeholder { color: #8aa97b; }
  .search-btn { position: absolute; right: 10px; height: 50px; padding: 0 32px; border-radius: 100px; border: none; background: rgba(155, 196, 124, 0.25); backdrop-filter: blur(8px); font-size: 15px; font-weight: 580; color: #356e3a; cursor: pointer; transition: all 0.2s; }
  .search-btn:hover { background: rgba(130, 175, 100, 0.45); transform: scale(0.96); }
  .weather-block { margin-bottom: 24px; padding: 20px 28px; }
  .weather-main-row { display: flex; align-items: center; justify-content: center; gap: 24px; flex-wrap: wrap; }
  .weather-icon { font-size: 2.5rem; color: #4a7058; line-height: 1; }
  .weather-temp { font-size: 60px; font-weight: 640; line-height: 1; color: #2a4a3a; }
  .weather-temp small { font-size: 28px; font-weight: 500; }
  .weather-desc { font-size: 20px; font-weight: 520; background: rgba(225, 240, 205, 0.7); backdrop-filter: blur(4px); padding: 6px 22px; border-radius: 60px; color: #426a50; border: 0.3px solid rgba(190, 215, 160, 0.6); }
  .weather-meta { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-top: 18px; padding-top: 12px; border-top: 1px solid rgba(140, 170, 110, 0.2); }
  .weather-location { display: flex; align-items: center; gap: 6px; font-size: 14px; background: rgba(225, 240, 205, 0.6); padding: 5px 16px; border-radius: 40px; color: #3a6048; position: relative; cursor: pointer; }
  .location-edit { cursor: pointer; font-size: 12px; opacity: 0.6; margin-left: 4px; }
  .location-edit:hover { opacity: 1; }
  .location-input { background: rgba(255, 255, 245, 0.98); border: 1px solid #9bc47c; border-radius: 40px; padding: 4px 12px; font-size: 13px; outline: none; width: 130px; color: #2a4236; }
  .weather-update { font-size: 12px; background: rgba(225, 240, 205, 0.6); padding: 5px 16px; border-radius: 40px; opacity: 0.8; color: #497a59; cursor: pointer; transition: all 0.2s; }
  .weather-update:hover { background: rgba(190, 215, 160, 0.8); opacity: 1; }
  .city-suggestions { position: absolute; bottom: 100%; left: 0; right: 0; background: rgba(255, 255, 245, 0.98); backdrop-filter: blur(16px); border-radius: 20px; margin-bottom: 8px; padding: 6px 0; z-index: 100; box-shadow: 0 8px 20px rgba(0,0,0,0.12); border: 1px solid rgba(185, 210, 155, 0.5); max-height: 200px; overflow-y: auto; }
  .suggestion-item { padding: 8px 16px; cursor: pointer; font-size: 13px; color: #2c4a3a; }
  .suggestion-item:hover { background: rgba(155, 196, 124, 0.2); }
  .poetry-block { padding: 18px 26px; background: rgba(255, 255, 252, 0.88); backdrop-filter: blur(14px); border-radius: 56px; border: 1px solid rgba(210, 225, 190, 0.7); }
  .poetry-text { font-size: 16px; line-height: 1.55; text-align: center; color: #2c4a3a; letter-spacing: 0.5px; }
  @media (max-width: 768px) {
    .glass-panel { padding: 26px 22px 34px; }
    .time-digits { font-size: 58px; letter-spacing: 4px; }
    .seconds-pill { font-size: 15px; }
    .weather-icon { font-size: 2rem; }
    .weather-temp { font-size: 46px; }
    .weather-temp small { font-size: 24px; }
    .weather-desc { font-size: 16px; }
    .location-input { width: 110px; font-size: 12px; }
  }
  @media (min-width: 1024px) {
    .glass-panel { max-width: 880px; padding: 42px 48px 52px; }
    .time-digits { font-size: 96px; }
    .weather-icon { font-size: 3rem; }
    .weather-temp { font-size: 72px; }
    .location-input { width: 150px; font-size: 14px; }
  }
  .weather-loading { animation: subtlePulse 1.2s infinite; }
  @keyframes subtlePulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
  
  /* 天气图标占位样式 */
  .weather-icon-placeholder {
    font-size: 2.5rem;
    color: #9bc47c;
    opacity: 0.5;
  }
  @media (max-width: 768px) {
    .weather-icon-placeholder { font-size: 2rem; }
  }
</style>
</head>
<body>
<div class="bg-orb-left"></div>
<div class="glass-panel">
  <div class="time-block glass-card">
    <div class="time-main"><span class="time-digits" id="clockDisplay">--:--</span><span class="seconds-pill" id="secondsDisplay">--</span></div>
    <div class="date-lotus" id="dateDisplay">--/-- 星期—</div>
  </div>
  <div class="search-block glass-card">
    <form class="search-form" onsubmit="handleSearch(event)" autocomplete="off">
      <input type="text" id="searchInput" class="search-input" placeholder="搜索诗句、知识、万物 ···" autofocus autocomplete="off" />
      <button type="submit" class="search-btn">搜 索</button>
    </form>
  </div>
  <div class="weather-block glass-card" id="weatherWidget">
    <div class="weather-main-row">
      <i class="weather-icon" id="weatherIcon"></i>
      <span class="weather-temp" id="weatherTemp">--<small>°C</small></span>
      <span class="weather-desc" id="weatherDesc">请输入城市</span>
    </div>
    <div class="weather-meta">
      <div class="weather-location" id="locationContainer">
        <span>📍</span><span id="locationDisplay" class="location-display">点击输入城市</span><span class="location-edit" id="locationEditBtn" title="修改城市">✎</span>
        <div id="citySuggestions" class="city-suggestions" style="display: none;"></div>
      </div>
      <div class="weather-update" id="weatherUpdate" onclick="refreshWeather()">⏱️ 点击刷新</div>
    </div>
  </div>
  <div class="poetry-block"><div class="poetry-text" id="poemLine">—— 诗意向晚 ——</div></div>
</div>

<!-- 今日诗词官方SDK -->
<script src="https://sdk.jinrishici.com/v2/browser/jinrishici.js" charset="utf-8"></script>

<script>
  // ==================== 和风天气配置 ====================
  const MY_API_HOST = 'https://na6yw2gd3y.re.qweatherapi.com';
  const MY_API_KEY = '93d3ffa7628d4d6aa31deb616c4fd06a';
  
  const GEO_API = `${MY_API_HOST}/geo/v2/city/lookup`;
  const WEATHER_API = `${MY_API_HOST}/v7/weather/now`;
  
  let currentCity = localStorage.getItem('qweather_city') || '';
  let currentLocationId = localStorage.getItem('qweather_location_id') || '';
  let isEditing = false;
  let searchTimeout = null;
  
  // 天气图标映射（和风天气官方图标字体类名）
  // 根据天气代码返回对应的 qi-xxx 类名
  function getWeatherIconClass(code) {
    // 处理特殊情况：天气代码可能是字符串或数字
    const codeStr = String(code);
    // 返回对应图标的类名，格式为 qi-{code}
    // 官方图标库中定义了从 100 到 999 的代码
    return `qi-${codeStr}`;
  }
  
  // ========== 1. 时钟 ==========
  function updateClockAndDate() {
    const now = new Date();
    document.getElementById('clockDisplay').innerText = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    document.getElementById('secondsDisplay').innerText = now.getSeconds().toString().padStart(2,'0');
    const month = (now.getMonth()+1).toString().padStart(2,'0');
    const day = now.getDate().toString().padStart(2,'0');
    const weekday = now.toLocaleDateString('zh-CN', { weekday: 'short' }).replace('周', '星期');
    document.getElementById('dateDisplay').innerText = `${month}/${day} ${weekday}`;
  }
  setInterval(updateClockAndDate, 1000);
  updateClockAndDate();

  // ========== 2. 今日诗词（jinrishici.com） ==========
  const poemEl = document.getElementById('poemLine');
  
  function refreshPoem() {
    poemEl.style.opacity = '0.4';
    jinrishici.load(result => {
      poemEl.innerText = result.data.content;
      poemEl.style.opacity = '1';
    });
  }

  // 初始化加载诗词
  refreshPoem();
  // 每50分钟自动刷新
  setInterval(refreshPoem, 50 * 60 * 1000);
  
  // ========== 3. 天气功能 ==========
  const locationDisplay = document.getElementById('locationDisplay');
  const locationContainer = document.getElementById('locationContainer');
  const suggestionsDiv = document.getElementById('citySuggestions');
  const weatherIconSpan = document.getElementById('weatherIcon');  // 现在是 <i> 元素
  const weatherTempSpan = document.getElementById('weatherTemp');
  const weatherDescSpan = document.getElementById('weatherDesc');
  const weatherUpdateSpan = document.getElementById('weatherUpdate');
  
  function setWeatherLoading(loading) {
    document.getElementById('weatherWidget').classList[loading ? 'add' : 'remove']('weather-loading');
  }
  
  // 显示加载中的占位图标（一个虚线圈效果）
  function setWeatherIconPlaceholder() {
    weatherIconSpan.className = 'weather-icon qi-999';
    weatherIconSpan.style.opacity = '0.5';
  }
  
  function setWeatherIcon(code) {
    const iconClass = getWeatherIconClass(code);
    weatherIconSpan.className = `weather-icon ${iconClass}`;
    weatherIconSpan.style.opacity = '1';
  }
  
  // 城市搜索（GeoAPI）
  async function searchCitySuggestions(keyword) {
    if (!keyword || keyword.length < 1) {
      suggestionsDiv.style.display = 'none';
      return;
    }
    try {
      const url = `${GEO_API}?location=${encodeURIComponent(keyword)}&key=${MY_API_KEY}`;
      const res = await fetch(url);
      const data = await res.json();
      
      if (data.code === '200' && data.location && data.location.length) {
        const locations = data.location.slice(0, 6);
        suggestionsDiv.style.display = 'block';
        suggestionsDiv.innerHTML = locations.map(loc => 
          `<div class="suggestion-item" onmousedown="selectCity('${loc.name}', '${loc.id}')">
            ${loc.name}${loc.adm1 ? ` · ${loc.adm1}` : ''}
           </div>`
        ).join('');
      } else {
        suggestionsDiv.style.display = 'none';
      }
    } catch (err) {
      console.error('搜索失败:', err);
      suggestionsDiv.style.display = 'none';
    }
  }
  window.selectCity = function(cityName, locationId) {
    currentCity = cityName;
    currentLocationId = locationId;
    localStorage.setItem('qweather_city', cityName);
    localStorage.setItem('qweather_location_id', locationId);
    suggestionsDiv.style.display = 'none';
    exitEditMode(cityName);
    getWeather();
  };
  function enterEditMode() {
    if (isEditing) return;
    isEditing = true;
    
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'location-input';
    input.value = currentCity || '';
    input.placeholder = '输入城市名';
    input.autocomplete = 'off';
    
    locationDisplay.style.display = 'none';
    locationContainer.insertBefore(input, document.getElementById('locationEditBtn'));
    input.focus();
    
    input.addEventListener('input', (e) => {
      if (searchTimeout) clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => searchCitySuggestions(e.target.value.trim()), 300);
    });
    
    input.addEventListener('blur', () => {
      setTimeout(() => {
        if (isEditing) exitEditMode(input.value);
      }, 200);
    });
    
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        exitEditMode(input.value);
        getWeather();
      }
      if (e.key === 'Escape') exitEditMode(currentCity);
    });
  }
  function exitEditMode(inputValue) {
    isEditing = false;
    suggestionsDiv.style.display = 'none';
    
    const input = locationContainer.querySelector('.location-input');
    if (input) input.remove();
    locationDisplay.style.display = 'inline';
    
    if (inputValue && inputValue.trim() && inputValue.trim() !== currentCity) {
      currentCity = inputValue.trim();
      currentLocationId = '';
      localStorage.setItem('qweather_city', currentCity);
      localStorage.removeItem('qweather_location_id');
      locationDisplay.innerText = currentCity;
      getWeather();
    } else if (currentCity) {
      locationDisplay.innerText = currentCity;
    } else {
      locationDisplay.innerText = '点击输入城市';
    }
  }
  // 获取实时天气
  async function getWeather() {
    if (!currentCity) {
      locationDisplay.innerText = '点击输入城市';
      weatherTempSpan.innerHTML = "--<small>°C</small>";
      weatherDescSpan.innerText = "请输入城市";
      setWeatherIconPlaceholder();
      return;
    }
    
    locationDisplay.innerText = currentCity;
    setWeatherLoading(true);
    setWeatherIconPlaceholder();
    
    try {
      let locationId = currentLocationId;
      
      if (!locationId) {
        const searchUrl = `${GEO_API}?location=${encodeURIComponent(currentCity)}&key=${MY_API_KEY}`;
        const searchRes = await fetch(searchUrl);
        const searchData = await searchRes.json();
        
        if (searchData.code === '200' && searchData.location && searchData.location.length > 0) {
          const loc = searchData.location[0];
          currentCity = loc.name;
          locationId = loc.id;
          currentLocationId = locationId;
          localStorage.setItem('qweather_city', currentCity);
          localStorage.setItem('qweather_location_id', locationId);
          locationDisplay.innerText = currentCity;
        } else {
          throw new Error(`未找到城市"${currentCity}"`);
        }
      }
      
      const weatherUrl = `${WEATHER_API}?location=${locationId}&key=${MY_API_KEY}`;
      const weatherRes = await fetch(weatherUrl);
      const weatherData = await weatherRes.json();
      
      if (weatherData.code !== '200') {
        throw new Error(`API错误: ${weatherData.code}`);
      }
      
      if (!weatherData.now) {
        throw new Error('无天气数据');
      }
      
      const now = weatherData.now;
      const temp = Math.round(parseFloat(now.temp));
      const weatherCode = now.icon;
      const humidity = now.humidity;
      const windSpeed = now.windSpeed;
      const weatherText = now.text || "未知";
      
      // 设置天气图标（和风天气图标字体）
      setWeatherIcon(weatherCode);
      
      weatherTempSpan.innerHTML = `${temp}<small>°C</small>`;
      weatherDescSpan.innerText = weatherText;
      
      const nowTime = new Date();
      const timeStr = `${nowTime.getHours().toString().padStart(2,'0')}:${nowTime.getMinutes().toString().padStart(2,'0')}`;
      let extra = "";
      if (humidity) extra += `💧${humidity}% `;
      if (windSpeed) extra += `🍃${Math.round(parseFloat(windSpeed))}km/h`;
      weatherUpdateSpan.innerText = `⏱️ ${timeStr} ${extra ? `· ${extra}` : "· 正好风来"}`;
      
    } catch (err) {
      console.error('天气获取失败:', err);
      weatherTempSpan.innerHTML = "--<small>°C</small>";
      weatherDescSpan.innerText = "获取失败";
      setWeatherIconPlaceholder();
      weatherUpdateSpan.innerText = `⏱️ ${err.message.substring(0, 30)}`;
    } finally {
      setWeatherLoading(false);
    }
  }
  window.refreshWeather = function() {
    if (currentCity) {
      getWeather();
    } else {
      enterEditMode();
    }
  };
  
  // 事件绑定
  document.getElementById('locationEditBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    enterEditMode();
  });
  
  locationDisplay.addEventListener('click', (e) => {
    e.stopPropagation();
    enterEditMode();
  });
  
  document.addEventListener('click', (e) => {
    if (!locationContainer.contains(e.target)) {
      suggestionsDiv.style.display = 'none';
    }
  });
  
  // ========== 4. 搜索功能 ==========
  const searchInput = document.getElementById('searchInput');
  
  function handleSearch(e) {
    e.preventDefault();
    let query = searchInput.value.trim();
    if (query === "") {
      refreshPoem();
      searchInput.placeholder = "✨ 寻一抹青柠诗意 ✨";
      setTimeout(() => {
        if (searchInput.placeholder === "✨ 寻一抹青柠诗意 ✨") 
          searchInput.placeholder = "搜索诗句、知识、万物 ···";
      }, 1500);
      return;
    }
    window.open(`https://www.baidu.com/s?wd=${encodeURIComponent(query)}`, '_blank');
  }
  
  document.addEventListener('keydown', (ev) => {
    if (ev.key === 'r' || ev.key === 'R') {
      const active = document.activeElement;
      if (active && (active.id === 'searchInput' || active.classList?.contains('location-input'))) return;
      ev.preventDefault();
      refreshPoem();
      const poemCard = document.querySelector('.poetry-block');
      if (poemCard) poemCard.style.background = "rgba(225, 245, 200, 0.7)";
      setTimeout(() => poemCard.style.background = "", 200);
    }
  });
  
  if (searchInput) {
    searchInput.addEventListener('focus', (e) => e.target.select());
    searchInput.setAttribute('autocomplete', 'off');
  }
  
  // 初始化：默认城市改为济南
  if (currentCity) {
    locationDisplay.innerText = currentCity;
    getWeather();
  } else {
    // 默认济南
    currentCity = '济南';
    currentLocationId = '101120101';  // 济南的和风天气 location id
    localStorage.setItem('qweather_city', currentCity);
    localStorage.setItem('qweather_location_id', currentLocationId);
    locationDisplay.innerText = currentCity;
    getWeather();
  }
  
  document.body.style.overflow = 'hidden';
</script>
</body>
</html>
